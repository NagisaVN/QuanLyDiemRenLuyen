<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Use case diagram - Hệ thống quản lý điểm rèn luyện</title>
  <desc id="desc">Sơ đồ use case tổng quan cho hệ thống quản lý điểm rèn luyện.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .boundary { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .boundary-title { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .actor-line, .assoc { stroke: #334155; stroke-width: 2; fill: none; }
      .relation { stroke: #475569; stroke-width: 1.8; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
      .actor-text { font: 600 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .usecase { fill: #fff; stroke: #334155; stroke-width: 2; }
      .usecase-text { font: 600 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .relation-text { font: 13px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .note { font: 14px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="page" width="1500" height="980"/>
  <text x="750" y="40" class="title" text-anchor="middle">Use Case Tổng Quan - Hệ thống quản lý điểm rèn luyện</text>
  <text x="750" y="66" class="subtitle" text-anchor="middle">Actor ở ngoài system boundary, ellipse là use case chính, nét đứt biểu diễn include/extend.</text>

  <rect x="225" y="95" width="1050" height="815" rx="8" class="boundary"/>
  <text x="750" y="125" class="boundary-title" text-anchor="middle">System Boundary: Quản lý điểm rèn luyện</text>

  <!-- Actor helper shapes -->
  <g id="guest" transform="translate(95 145)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Khách</text>
  </g>
  <g id="user" transform="translate(95 330)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Người dùng</text>
    <text x="0" y="160" class="actor-text">đã đăng nhập</text>
  </g>
  <g id="admin" transform="translate(95 540)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Admin</text>
  </g>
  <g id="student" transform="translate(95 770)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Sinh viên</text>
  </g>

  <g id="gvcn" transform="translate(1405 210)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">GVCN/Cố vấn</text>
  </g>
  <g id="union" transform="translate(1405 485)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Cán bộ</text>
    <text x="0" y="160" class="actor-text">Đoàn - Hội</text>
  </g>
  <g id="council" transform="translate(1405 755)">
    <circle cx="0" cy="0" r="17" class="actor-line"/>
    <line x1="0" y1="17" x2="0" y2="68" class="actor-line"/>
    <line x1="-35" y1="37" x2="35" y2="37" class="actor-line"/>
    <line x1="0" y1="68" x2="-30" y2="112" class="actor-line"/>
    <line x1="0" y1="68" x2="30" y2="112" class="actor-line"/>
    <text x="0" y="140" class="actor-text">Hội đồng khoa</text>
  </g>

  <!-- Auth and shared account use cases -->
  <ellipse cx="390" cy="165" rx="100" ry="36" class="usecase"/>
  <text x="390" y="165" class="usecase-text">Đăng nhập</text>

  <ellipse cx="390" cy="255" rx="108" ry="36" class="usecase"/>
  <text x="390" y="255" class="usecase-text">Quên mật khẩu</text>

  <ellipse cx="620" cy="255" rx="112" ry="36" class="usecase"/>
  <text x="620" y="255" class="usecase-text">Đặt lại mật khẩu</text>

  <ellipse cx="415" cy="365" rx="110" ry="38" class="usecase"/>
  <text x="415" y="365" class="usecase-text">Cập nhật hồ sơ</text>

  <ellipse cx="650" cy="365" rx="106" ry="38" class="usecase"/>
  <text x="650" y="365" class="usecase-text">Đổi mật khẩu</text>

  <ellipse cx="895" cy="365" rx="120" ry="42" class="usecase"/>
  <text x="895" y="356" class="usecase-text">Vào dashboard</text>
  <text x="895" y="376" class="usecase-text">theo vai trò</text>

  <!-- Admin use cases -->
  <ellipse cx="415" cy="525" rx="120" ry="42" class="usecase"/>
  <text x="415" y="515" class="usecase-text">Quản trị</text>
  <text x="415" y="535" class="usecase-text">dữ liệu nền</text>

  <ellipse cx="675" cy="525" rx="126" ry="42" class="usecase"/>
  <text x="675" y="515" class="usecase-text">Quản lý người dùng</text>
  <text x="675" y="535" class="usecase-text">và phân quyền</text>

  <ellipse cx="935" cy="525" rx="120" ry="42" class="usecase"/>
  <text x="935" y="515" class="usecase-text">Quản lý</text>
  <text x="935" y="535" class="usecase-text">đợt đánh giá</text>

  <!-- Student use cases -->
  <ellipse cx="420" cy="720" rx="128" ry="46" class="usecase"/>
  <text x="420" y="710" class="usecase-text">Tự đánh giá</text>
  <text x="420" y="731" class="usecase-text">và nộp phiếu</text>

  <ellipse cx="685" cy="700" rx="108" ry="36" class="usecase"/>
  <text x="685" y="700" class="usecase-text">Tải minh chứng</text>

  <ellipse cx="420" cy="850" rx="112" ry="36" class="usecase"/>
  <text x="420" y="850" class="usecase-text">Xem lịch sử điểm</text>

  <ellipse cx="700" cy="840" rx="125" ry="42" class="usecase"/>
  <text x="700" y="830" class="usecase-text">Đăng ký/điểm danh</text>
  <text x="700" y="850" class="usecase-text">hoạt động</text>

  <!-- GVCN use cases -->
  <ellipse cx="1080" cy="235" rx="126" ry="42" class="usecase"/>
  <text x="1080" y="225" class="usecase-text">Duyệt phiếu</text>
  <text x="1080" y="245" class="usecase-text">cấp GVCN</text>

  <ellipse cx="1080" cy="350" rx="114" ry="36" class="usecase"/>
  <text x="1080" y="350" class="usecase-text">Duyệt minh chứng</text>

  <!-- Union use cases -->
  <ellipse cx="1080" cy="510" rx="122" ry="42" class="usecase"/>
  <text x="1080" y="500" class="usecase-text">Quản lý</text>
  <text x="1080" y="520" class="usecase-text">hoạt động</text>

  <ellipse cx="1080" cy="625" rx="130" ry="42" class="usecase"/>
  <text x="1080" y="615" class="usecase-text">Duyệt đăng ký</text>
  <text x="1080" y="635" class="usecase-text">và điểm danh</text>

  <!-- Council use cases -->
  <ellipse cx="1080" cy="750" rx="126" ry="42" class="usecase"/>
  <text x="1080" y="740" class="usecase-text">Xác nhận điểm</text>
  <text x="1080" y="760" class="usecase-text">cuối cùng</text>

  <ellipse cx="1080" cy="850" rx="94" ry="34" class="usecase"/>
  <text x="1080" y="850" class="usecase-text">Khóa phiếu</text>

  <ellipse cx="900" cy="850" rx="100" ry="34" class="usecase"/>
  <text x="900" y="850" class="usecase-text">Xuất báo cáo</text>

  <!-- Associations: left actors -->
  <line x1="130" y1="180" x2="292" y2="165" class="assoc"/>
  <line x1="130" y1="180" x2="284" y2="255" class="assoc"/>

  <line x1="130" y1="395" x2="307" y2="365" class="assoc"/>
  <line x1="130" y1="395" x2="545" y2="365" class="assoc"/>
  <line x1="130" y1="395" x2="778" y2="365" class="assoc"/>

  <line x1="130" y1="585" x2="298" y2="525" class="assoc"/>
  <line x1="130" y1="585" x2="552" y2="525" class="assoc"/>
  <line x1="130" y1="585" x2="818" y2="525" class="assoc"/>

  <line x1="130" y1="825" x2="296" y2="720" class="assoc"/>
  <line x1="130" y1="825" x2="310" y2="850" class="assoc"/>
  <line x1="130" y1="825" x2="578" y2="840" class="assoc"/>

  <!-- Associations: right actors -->
  <line x1="1370" y1="265" x2="1203" y2="235" class="assoc"/>
  <line x1="1370" y1="265" x2="1191" y2="350" class="assoc"/>

  <line x1="1370" y1="540" x2="1199" y2="510" class="assoc"/>
  <line x1="1370" y1="540" x2="1206" y2="625" class="assoc"/>

  <line x1="1370" y1="810" x2="1202" y2="750" class="assoc"/>
  <line x1="1370" y1="810" x2="1172" y2="850" class="assoc"/>
  <line x1="1370" y1="810" x2="998" y2="850" class="assoc"/>
  <line x1="1370" y1="810" x2="1048" y2="525" class="assoc"/>

  <!-- Include / extend relations -->
  <line x1="498" y1="255" x2="509" y2="255" class="relation"/>
  <text x="555" y="235" class="relation-text">&lt;&lt;extend&gt;&gt;</text>

  <line x1="537" y1="525" x2="550" y2="525" class="relation"/>
  <text x="590" y="505" class="relation-text">&lt;&lt;include&gt;&gt;</text>

  <line x1="545" y1="710" x2="579" y2="704" class="relation"/>
  <text x="592" y="685" class="relation-text">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1080" y1="277" x2="1080" y2="313" class="relation"/>
  <text x="1145" y="304" class="relation-text">&lt;&lt;extend&gt;&gt;</text>

  <line x1="1080" y1="552" x2="1080" y2="584" class="relation"/>
  <text x="1148" y="574" class="relation-text">&lt;&lt;include&gt;&gt;</text>

  <line x1="1080" y1="792" x2="1080" y2="816" class="relation"/>
  <text x="1145" y="815" class="relation-text">&lt;&lt;extend&gt;&gt;</text>

  <line x1="982" y1="835" x2="996" y2="805" class="relation"/>
  <text x="960" y="810" class="relation-text">&lt;&lt;extend&gt;&gt;</text>

  <text x="245" y="945" class="note">Nguồn: docs/usecase-tong-quan.md, routes/web.php, routes/auth.php và các controller nghiệp vụ.</text>
</svg>
